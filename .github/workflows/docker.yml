name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE_NAME: conclave

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}"
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAGS="${REPO}:latest,${REPO}:${SHA}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            TAGS="${TAGS},${REPO}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:$(echo ${{ github.sha }} | cut -c1-7) \
            .


      - name: Sync README to Docker Hub
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}/" \
            -H "Authorization: JWT $(curl -s -X POST "https://hub.docker.com/v2/users/login/" -H "Content-Type: application/json" -d '{"username":"${{ secrets.DOCKER_USERNAME }}","password":"${{ secrets.DOCKER_TOKEN }}"}' | jq -r '.token')" \
            -H "Content-Type: application/json" \
            -d "{\"full_description\": $(cat README.md | jq -Rs .)}" || true
