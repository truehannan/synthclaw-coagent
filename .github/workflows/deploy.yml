name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REMOTE_DIR: /opt/synthclaw
  SSH_USER: ${{ secrets.SSH_USER || 'root' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Python source
        run: |
          python -c "import ast; ast.parse(open('agent.py').read()); print('agent.py OK')"
          python -c "import ast; ast.parse(open('agents.py').read()); print('agents.py OK')"
          python -c "import ast; ast.parse(open('api_server.py').read()); print('api_server.py OK')"
          python -c "import ast; ast.parse(open('config.py').read()); print('config.py OK')"
          python -c "import ast; ast.parse(open('memory.py').read()); print('memory.py OK')"
          python -c "import ast; ast.parse(open('tools.py').read()); print('tools.py OK')"
          python -c "import ast; ast.parse(open('model_fetcher.py').read()); print('model_fetcher.py OK')"

      - name: Test Python imports
        env:
          SYNTHCLAW_BASE_DIR: .
        run: |
          python -c "import config; import memory; import agents; print('All imports OK')"

      - name: Build CLI
        run: cd cli && npm install && npm run build

      - name: Build Frontend
        run: cd frontend && npm install && npx vite build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create remote directory
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "mkdir -p ${{ env.REMOTE_DIR }}"

      - name: Upload Python agent files
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" scp -o StrictHostKeyChecking=no \
            main.py agent.py agents.py tools.py memory.py config.py \
            model_fetcher.py d1_storage.py api_server.py requirements.txt \
            ${{ env.SSH_USER }}@${{ secrets.HOST }}:${{ env.REMOTE_DIR }}/

      - name: Install remote Python dependencies
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "cd ${{ env.REMOTE_DIR }} && pip3 install -r requirements.txt -q" || true

      - name: Create/update systemd service
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "cat > /etc/systemd/system/synthclaw.service << 'EOF'
          [Unit]
          Description=SynthClaw Agent Society
          After=network.target

          [Service]
          Type=simple
          User=${{ env.SSH_USER }}
          WorkingDirectory=${{ env.REMOTE_DIR }}
          ExecStart=/usr/bin/python3 ${{ env.REMOTE_DIR }}/main.py
          Restart=always
          RestartSec=5
          Environment=SYNTHCLAW_BASE_DIR=${{ env.REMOTE_DIR }}

          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload && systemctl enable synthclaw"

      - name: Restart service
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "systemctl restart synthclaw"

      - name: Wait for startup
        run: sleep 5

      - name: Health check
        run: |
          for i in 1 2 3; do
            if sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
              ${{ env.SSH_USER }}@${{ secrets.HOST }} \
              "curl -sf http://localhost:8000/api/system/health"; then
              echo ""
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5s..."
            sleep 5
          done
          echo "✗ Health check failed after 3 attempts"
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "journalctl -u synthclaw -n 30 --no-pager" || true
          exit 1
