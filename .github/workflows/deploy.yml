name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REMOTE_DIR: /opt/conclave
  SSH_USER: root

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Python source
        run: |
          python -c "import ast; ast.parse(open('agent.py').read()); print('agent.py OK')"
          python -c "import ast; ast.parse(open('agents.py').read()); print('agents.py OK')"
          python -c "import ast; ast.parse(open('api_server.py').read()); print('api_server.py OK')"
          python -c "import ast; ast.parse(open('config.py').read()); print('config.py OK')"
          python -c "import ast; ast.parse(open('memory.py').read()); print('memory.py OK')"
          python -c "import ast; ast.parse(open('tools.py').read()); print('tools.py OK')"

      - name: Test Python imports
        env:
          CONCLAVE_BASE_DIR: .
        run: python -c "import config; import memory; import agents; print('All imports OK')"

      - name: Build CLI
        run: cd cli && npm install && npm run build

      - name: Build Frontend
        run: cd frontend && npm install && npx vite build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend for deployment
        run: cd frontend && npm install && npx vite build

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create remote directory structure
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "if [ -d /opt/synthclaw ] && [ ! -d /opt/conclave ]; then mv /opt/synthclaw /opt/conclave; fi && mkdir -p ${{ env.REMOTE_DIR }}/frontend/dist"

      - name: Upload Python agent files
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" scp -o StrictHostKeyChecking=no -r \
            main.py agent.py agents.py tools.py memory.py config.py \
            model_fetcher.py d1_storage.py api_server.py requirements.txt \
            ${{ env.SSH_USER }}@${{ secrets.HOST }}:${{ env.REMOTE_DIR }}/

      - name: Upload frontend build
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" scp -o StrictHostKeyChecking=no -r \
            frontend/dist/* \
            ${{ env.SSH_USER }}@${{ secrets.HOST }}:${{ env.REMOTE_DIR }}/frontend/dist/

      - name: Install Python dependencies on remote
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} << 'SCRIPT'
          set -e
          cd /opt/conclave

          # Ubuntu 24.04 uses python3.12 — need the specific venv package
          PYVER=$(python3 --version 2>&1 | grep -oP '\d+\.\d+')
          echo "Python version: $PYVER"

          apt-get update -qq
          apt-get install -y -qq python3-venv python3-pip python3.${PYVER##*.}-venv nginx curl 2>/dev/null || \
          apt-get install -y -qq python3-venv python3-pip nginx curl 2>/dev/null

          # Create venv
          python3 -m venv venv
          if [ ! -f "./venv/bin/pip" ]; then
            echo "ERROR: venv creation failed"
            # Fallback: install directly with --break-system-packages
            pip3 install --break-system-packages -r requirements.txt -q
          else
            ./venv/bin/pip install --upgrade pip -q
            ./venv/bin/pip install -r requirements.txt -q
          fi
          SCRIPT

      - name: Install and configure nginx
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} << 'SCRIPT'
          cat > /etc/nginx/sites-available/conclave << 'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              root /opt/conclave/frontend/dist;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:8000/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_buffering off;
                  proxy_cache off;
                  proxy_read_timeout 120s;
                  proxy_connect_timeout 10s;
                  chunked_transfer_encoding on;
              }
          }
          NGINX
          rm -f /etc/nginx/sites-enabled/default 2>/dev/null
          rm -f /etc/nginx/sites-enabled/synthclaw 2>/dev/null
          rm -f /etc/nginx/sites-available/synthclaw 2>/dev/null
          ln -sf /etc/nginx/sites-available/conclave /etc/nginx/sites-enabled/conclave
          nginx -t && systemctl restart nginx
          SCRIPT

      - name: Create and start systemd service
        run: |
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} << 'SCRIPT'
          # Determine which python to use
          if [ -f "/opt/conclave/venv/bin/python3" ]; then
            PYTHON_BIN="/opt/conclave/venv/bin/python3"
          else
            PYTHON_BIN="/usr/bin/python3"
          fi

          cat > /etc/systemd/system/conclave.service << SVC
          [Unit]
          Description=Conclave Agent Society
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/conclave
          ExecStart=$PYTHON_BIN /opt/conclave/main.py
          Restart=always
          RestartSec=5
          Environment=CONCLAVE_BASE_DIR=/opt/conclave
          Environment=CONCLAVE_API_PORT=8000
          Environment=CONCLAVE_API_HOST=0.0.0.0
          Environment=INTERFACE_MODE=cli

          [Install]
          WantedBy=multi-user.target
          SVC
          systemctl daemon-reload
          # Stop and remove old synthclaw service if exists
          systemctl stop synthclaw 2>/dev/null || true
          systemctl disable synthclaw 2>/dev/null || true
          rm -f /etc/systemd/system/synthclaw.service 2>/dev/null
          systemctl enable conclave
          systemctl restart conclave
          SCRIPT

      - name: Wait for startup
        run: sleep 8

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            RESULT=$(sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
              ${{ env.SSH_USER }}@${{ secrets.HOST }} \
              "curl -sf http://localhost:8000/api/system/health 2>/dev/null" || echo "FAIL")
            if echo "$RESULT" | grep -q "ok"; then
              echo "✓ API health check passed!"
              echo "✓ Deployed to: http://${{ secrets.HOST }}"
              exit 0
            fi
            echo "Attempt $i: waiting 5s..."
            sleep 5
          done
          echo "⚠ API health check failed — checking logs..."
          sshpass -p "${{ secrets.PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ secrets.HOST }} \
            "journalctl -u conclave -n 20 --no-pager" || true
          echo ""
          echo "Note: nginx may still serve frontend at http://${{ secrets.HOST }}"
          echo "API may need .env configuration (OPENAI_API_KEY etc)"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "══════════════════════════════════════════"
          echo "  DEPLOYMENT COMPLETE"
          echo "══════════════════════════════════════════"
          echo "  Frontend: http://${{ secrets.HOST }}"
          echo "  API:      http://${{ secrets.HOST }}/api"
          echo "  Health:   http://${{ secrets.HOST }}/api/system/health"
          echo "══════════════════════════════════════════"
